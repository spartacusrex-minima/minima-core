plugins {
    // Apply the java plugin to add support for Java
    id 'java'

    // Apply the application plugin to add support for building a CLI application.
    id 'application'

    // shadowJar plugin to build fat jar
    id 'com.github.johnrengelman.shadow' version '6.1.0'

	//Add docker build and publish
    id 'com.palantir.docker' version '0.34.0'
}

sourceCompatibility = JavaVersion.VERSION_11

repositories {
    // Use jcenter for resolving dependencies.
    // You can declare any Maven/Ivy/file repository here.
    jcenter()
}

dependencies {
    
    // Use JUnit test framework
    testImplementation 'junit:junit:4.13'
    
    implementation 'com.h2database:h2:2.4.240'
    //implementation 'com.h2database:h2:2.1.214'
    
    //Bouncy Castle
    implementation 'org.bouncycastle:bcpkix-jdk15on:1.69'
    
    //MySQL connector
 	implementation "mysql:mysql-connector-java:8.0.26"
}

sourceSets {
    main {
         java {
            srcDirs = ['src']
         }
         
        resources {
            srcDirs = ['resources']
        }
    }

    test {
        java {
            srcDirs = ['test']
        }
    }
}

// reproducible builds
tasks.withType(AbstractArchiveTask) {
    preserveFileTimestamps = false
    reproducibleFileOrder = true
}

tasks.named('shadowJar', com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar) {
  minimize(){
    //exclude(dependency('org.bouncycastle.cert:.*:.*'))
  }
}

compileJava {
	sourceCompatibility = '1.8'
    targetCompatibility = '1.8'
    //options.compilerArgs << '-something'
}

application {
    // Define the main class for the application.
    mainClassName = 'org.minima.Minima'
}

jar {
    manifest {
        attributes 'Main-Class': 'org.minima.Minima'
    }
}

